<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>

    * {
        
        margin:0;
        padding: 0;
        
    }

    .all {
        display:flex;
        height: 100vh;
    }
    .showfish {
        display: flex;           
        flex-direction: column;  
        align-items: center;     
        justify-content: center; 
        height: auto;
        width: 70%;
        
        background-color: rgba(236, 240, 205, 0.884);
    }

    .showfish > .btn {
        justify-content: center;
        align-items: center;
    }

    
    .helptools {
       
        
        background-color: rgba(245, 240, 240, 0.897);
        
        width: 30%;
    }
    .box {
        display:flex;
    }

    #btn > img {
        width: 150px;
        height:250px;
    }


</style>
<body>
    <div class="all">
        <div class="showfish">
            <div>
                <p id="display">0</p>
            </div>
            <div>
                <p id="showtime">0</p>
            </div>
            <button id="btn">
                <img src="/images/fishandbread.png" />
            </button> 
        </div>
        
        <div class="helptools">
            <div class="box">
                <button class="cushorbox" id="cursor">
                    Curshor
                </button>
                <div class="cushorcount">
                    <p id="mouse">0</p>
                    <p id="showprice">15</p>
                </div>
            </div>
            <div class="box">
                <button class="cushorbox" id="cursor">
                    Curshor
                </button>
                <div class="cushorcount">
                    <p id="mouse">0</p>
                    <p id="showprice">15</p>
                </div>
            </div>
            
            
        </div>
        
    </div>
    
</body>
html<script>

    let a = 0;
    let b = 0;
    let price = 15;
    let time = 0;
    let intervalId = null;
    
    const display = document.getElementById("display")
    const showprice = document.getElementById("showprice")
    const btn = document.getElementById("btn")
    const cursor = document.getElementById("cursor")
    const mouse = document.getElementById("mouse")
    const showtime = document.getElementById("showtime")

    const click = function click(){
            a += 1
            display.innerText = a;
        }
        
    
    
    const cursor1 = function cursor1(){
        
        
        if (a >= price){
            if (b === 0){
                display.innerText = a - price;
                a = a - price

                time += 30000
                showtime.innerText = time
                b += 1
                price += 3

                showprice.innerText = price
                clearInterval(intervalId);
                intervalId = setInterval(click, time);
                mouse.innerText = b;
            }
            
            else if (b >= 1){

                display.innerText = a - price;
                a = a - price

                time = time/2
                showtime.innerText = time
                b += 1
                price += 3

                showprice.innerText = price
                clearInterval(intervalId);
                intervalId = setInterval(click, time);
                mouse.innerText = b;
            }

            
        }

    }

    btn.addEventListener("click",click)

    cursor.addEventListener("click",cursor1)
</script>
</html>
