<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="a">0</p>
    <button onclick="count()">click</button>
</body>
<script>


    let count1 = 0

    function count() {
        
        count1 += 1;
        document.getElementById("a").innerText = count1;

    }
</script>
</html>
